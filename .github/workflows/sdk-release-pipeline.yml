name: Release pipeline for sdk

on:
  push:
    tags:
      - '*'

jobs:
  build:
    uses: ./.github/workflows/supermetrics-build.yml
    with:
      python-version: "3.11"

  test-publish:
    needs: build
    uses: ./.github/workflows/supermetrics-test-pypi-publish.yml
    with:
      python-version: "3.11"
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  prod-publish:
    needs: test-publish
    uses: ./.github/workflows/supermetrics-pypi-publish.yml
    with:
      python-version: "3.11"
    permissions:
      id-token: write
      contents: read
    secrets: inherit
