    Error:
      type: object
      description: Machine- and human-readable detail for a failed request.
      properties:
        code:
          type: string
          pattern: ^[A-Z][A-Z0-9_]*$
          maxLength: 100
          description: 'Stable, screaming-snake-case identifier for the error condition.
            Clients should branch on this, not on `message`. Common values include
            BAD_REQUEST, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT_ERROR, PERMISSION_ERROR,
            UNPROCESSABLE_ENTITY, UNPROCESSABLE_CONTENT, TOO_MANY_REQUESTS, INTERNAL_SERVER_ERROR,
            DUPLICATION_FAILED, SERVICE_UNAVAILABLE; domains may define additional
            codes.

            '
          example: BAD_REQUEST
        message:
          type: string
          maxLength: 255
          pattern: ^.+$
          description: Short, human-readable summary of the error.
          example: The request was invalid.
        description:
          type: string
          maxLength: 2048
          description: Optional longer explanation specific to this occurrence.
          example: The field 'display_name' must not be empty.
      required:
      - code
      - message
      additionalProperties: false
