components:
  schemas:
    Backfill:
      type: object
      required:
      - transfer_backfill_id
      - transfer_id
      - range_start_date
      - range_end_date
      - status
      - created_time
      - created_user_id
      - transfer_runs_total
      - transfer_runs_created
      - transfer_runs_completed
      - transfer_runs_failed
      properties:
        transfer_backfill_id:
          type: integer
          format: int64
          minimum: 1
          maximum: 9223372036854775807
          description: Unique identifier of the backfill
          example: 12345
        transfer_id:
          type: integer
          format: int64
          minimum: 1
          maximum: 9223372036854775807
          description: ID of the transfer this backfill belongs to
          example: 456789
        range_start_date:
          type: string
          format: date
          maxLength: 10
          description: Start date of the backfill range
          example: '2024-01-01'
        range_end_date:
          type: string
          format: date
          maxLength: 10
          description: End date of the backfill range
          example: '2024-01-31'
        created_time:
          type: string
          format: date-time
          maxLength: 30
          description: Timestamp when the backfill was created (ISO 8601 format)
          example: '2024-02-01T09:00:00Z'
        created_user_id:
          type: integer
          format: int64
          minimum: 1
          maximum: 9223372036854775807
          description: ID of the user who created the backfill
          example: 789
        removed_time:
          type: string
          format: date-time
          maxLength: 30
          description: Timestamp when the backfill was cancelled/removed (ISO 8601
            format)
          example: '2024-02-01T15:00:00Z'
          nullable: true
        removed_user_id:
          type: integer
          format: int64
          minimum: 1
          maximum: 9223372036854775807
          description: ID of the user who cancelled/removed the backfill
          example: 790
          nullable: true
        start_time:
          type: string
          format: date-time
          maxLength: 30
          description: Timestamp when the backfill processing started (ISO 8601 format)
          example: '2024-02-01T10:00:00Z'
          nullable: true
        end_time:
          type: string
          format: date-time
          maxLength: 30
          description: Timestamp when the backfill processing completed (ISO 8601
            format)
          example: '2024-02-01T12:30:00Z'
          nullable: true
        status:
          type: string
          description: Current status of the backfill
          enum:
          - CREATED
          - SCHEDULED
          - RUNNING
          - FAILED
          - COMPLETED
          - CANCELLED
          example: RUNNING
        transfer_runs_total:
          type: integer
          format: int32
          minimum: 0
          maximum: 2147483647
          description: Total number of transfer runs created for this backfill
          example: 31
        transfer_runs_created:
          type: integer
          format: int32
          minimum: 0
          maximum: 2147483647
          description: Number of transfer runs that have been created
          example: 31
        transfer_runs_completed:
          type: integer
          format: int32
          minimum: 0
          maximum: 2147483647
          description: Number of transfer runs that have completed successfully
          example: 25
        transfer_runs_failed:
          type: integer
          format: int32
          minimum: 0
          maximum: 2147483647
          description: Number of transfer runs that have failed
          example: 2
        error_report:
          type: array
          description: List of errors that occurred during backfill processing (empty
            array if no errors)
          items:
            $ref: '#/components/schemas/TransferBackfillRunError'
    BackfillResponse:
      type: object
      required:
      - meta
      - data
      properties:
        meta:
          type: object
          description: Metadata included in every API response.
          properties:
            request_id:
              $ref: '#/components/schemas/RequestId'
          required:
          - request_id
          additionalProperties: false
        data:
          $ref: '#/components/schemas/Backfill'
    Connector:
      type: object
      description: A custom connector with its metadata.
      properties:
        connector_identifier:
          type: string
          maxLength: 100
          description: Unique identifier of the connector
          example: T3S70
        name:
          type: string
          maxLength: 255
          description: Name of the connector
          example: Test Connector
        description:
          type: string
          maxLength: 1000
          nullable: true
          description: Description of the connector
          example: A custom connector for fetching marketing data
        logo_url:
          type: string
          format: uri
          maxLength: 2048
          nullable: true
          description: URL of the connector logo
          example: https://assets.supermetrics.com/images/dsLogos/Custom_Connector_Default.png
        created_at:
          type: string
          format: date-time
          maxLength: 30
          description: Creation timestamp in ISO 8601 format
          example: '2025-01-01T00:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          maxLength: 30
          description: Last update timestamp in ISO 8601 format
          example: '2025-01-01T00:00:00+00:00'
    ConnectorWithConfiguration:
      description: A connector with its full configuration included.
      allOf:
      - $ref: '#/components/schemas/Connector'
      - type: object
        properties:
          configuration:
            $ref: '#/components/schemas/ConnectorConfiguration'
    CreateBackfillRequest:
      type: object
      required:
      - range_start
      - range_end
      properties:
        range_start:
          type: string
          format: date
          maxLength: 10
          description: Start date of the backfill range (inclusive)
          example: '2024-01-01'
          pattern: ^\d{4}-\d{2}-\d{2}$
        range_end:
          type: string
          format: date
          maxLength: 10
          description: End date of the backfill range (inclusive)
          example: '2024-01-31'
          pattern: ^\d{4}-\d{2}-\d{2}$
    CreateSecretRequest:
      type: object
      description: Secret name and value to encrypt and store.
      required:
      - secret_name
      - secret_value
      properties:
        secret_name:
          type: string
          maxLength: 255
          description: Human-readable name for the secret
          example: client_id
        secret_value:
          type: string
          maxLength: 10000
          description: Plaintext value to be encrypted and stored
          example: my-super-secret-value
    DataQuery:
      type: object
      properties:
        api_key:
          type: string
          maxLength: 255
          pattern: ^[A-Za-z0-9_-]+$
          description: API key when not using an authorization header
          example: abc123def456
        schedule_id:
          type: string
          maxLength: 50
          pattern: ^[A-Za-z0-9_-]+$
          description: Schedule ID for this query request. If not provided, one will
            be generated from other query parameters
          example: my_query_123
        ds_id:
          type: string
          maxLength: 50
          pattern: ^[A-Za-z0-9_-]+$
          description: Target data source ID
          example: GAWA
        ds_accounts:
          oneOf:
          - type: string
            maxLength: 50
            pattern: ^[A-Za-z0-9_-]+$
          - type: array
            maxItems: 100
            items:
              type: string
              maxLength: 50
              pattern: ^[A-Za-z0-9_-]+$
          - type: object
          description: List of data source accounts the query should target, or a
            filter for them
          example:
          - account123
          - account456
        ds_segments:
          oneOf:
          - type: string
            maxLength: 50
            pattern: ^[A-Za-z0-9_-]+$
          - type: array
            maxItems: 1000
            items:
              type: string
              maxLength: 50
              pattern: ^[A-Za-z0-9_-]+$
          description: List of data source segment IDs the query should target
          example:
          - segment1
          - segment2
        ds_user:
          type: string
          maxLength: 255
          description: Shorthand parameter to provide one value for ds_users
          example: user@example.com
        ds_users:
          oneOf:
          - type: string
            maxLength: 255
          - type: array
            maxItems: 100
            items:
              type: string
              maxLength: 255
          description: List of data source login usernames to limit when searching
            for suitable authentication
        date_range_type:
          type: string
          maxLength: 50
          description: Type of date range the query should use
        start_date:
          type: string
          maxLength: 100
          description: Fixed or relative start date for your query
          example: yesterday
        end_date:
          type: string
          maxLength: 100
          description: Fixed or relative end date for your query
          example: yesterday
        compare_type:
          type: string
          maxLength: 50
          description: Date range comparison type. Defaults to none
        compare_show:
          type: string
          maxLength: 50
          description: When compare_type is custom, display type for comparison values
        compare_start_date:
          type: string
          maxLength: 100
          description: When compare_type is custom, fixed or relative start date for
            comparison
        compare_end_date:
          type: string
          maxLength: 100
          description: When compare_type is custom, fixed or relative end date for
            comparison
        fields:
          oneOf:
          - type: string
            maxLength: 1000
          - type: array
            maxItems: 100
            items:
              type: string
              maxLength: 100
          - type: array
            maxItems: 100
            items:
              type: object
          description: Target data source fields the query should return
        settings:
          type: object
          description: Settings that should be applied when performing the query
        filter:
          type: string
          maxLength: 5000
          description: Filter string that should be applied to the results
        order_columns:
          type: string
          maxLength: 1000
          description: Order instruction for fields that are split by column
        order_rows:
          oneOf:
          - type: string
            maxLength: 1000
          - type: array
            maxItems: 50
            items:
              type: string
              maxLength: 100
          description: List of order fields and sort directions for result rows
        max_columns:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000
          description: Maximum number of columns the query results should contain
        max_rows:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000000
          description: Maximum number of rows the query results should contain
        offset_start:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000000
          description: Starting row index for paginated response
        offset_end:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000000
          description: Ending row index for paginated response
        cache_minutes:
          type: integer
          format: int32
          minimum: 0
          maximum: 10080
          description: Maximum allowed age of query results cache in minutes
        sync_timeout:
          type: integer
          format: int32
          minimum: 0
          maximum: 3600
          description: Number of seconds the API should wait for query to finish
      required:
      - ds_id
    DataResponse:
      type: object
      properties:
        meta:
          type: object
          properties:
            request_id:
              type: string
              maxLength: 50
              pattern: ^[A-Za-z0-9_-]+$
              description: API request ID
            schedule_id:
              type: string
              maxLength: 50
              pattern: ^[A-Za-z0-9_-]+$
              description: Custom or generated schedule ID for the query
            status_code:
              type: string
              maxLength: 20
              description: Status code for the query
            query:
              type: object
              properties:
                start_date:
                  type: string
                  maxLength: 10
                  pattern: ^\d{4}-\d{2}-\d{2}$
                  description: Query start date in YYYY-MM-DD format
                end_date:
                  type: string
                  maxLength: 10
                  pattern: ^\d{4}-\d{2}-\d{2}$
                  description: Query end date in YYYY-MM-DD format
                ds_accounts:
                  type: array
                  maxItems: 100
                  items:
                    type: string
                    maxLength: 50
                    pattern: ^[A-Za-z0-9_-]+$
                  description: Data source account IDs used in the query
                ds_segments:
                  type: array
                  maxItems: 1000
                  items:
                    type: string
                    maxLength: 50
                    pattern: ^[A-Za-z0-9_-]+$
                  description: Data source segment IDs used in the query
                fields:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        maxLength: 100
                        pattern: ^[A-Za-z0-9_-]+$
                        description: Field ID from the request
                      field_id:
                        type: string
                        maxLength: 100
                        pattern: ^[A-Za-z0-9_-]+$
                        description: Field ID the API uses
                      field_name:
                        type: string
                        maxLength: 255
                        description: Field name
                      field_type:
                        type: string
                        maxLength: 10
                        description: Field type
                      field_split:
                        type: string
                        maxLength: 50
                        description: Field split by type
                      data_type:
                        type: string
                        maxLength: 50
                        description: Field data type
                      data_column:
                        type: integer
                        format: int32
                        minimum: 0
                        maximum: 1000
                        description: Field value position in each data row
                      visible:
                        type: boolean
                        description: Whether data for this field is visible
                compare_type:
                  type: string
                  maxLength: 50
                  description: Date range comparison type used
                compare_show:
                  type: string
                  maxLength: 50
                  description: Display type for comparison values
                compare_start_date:
                  type: string
                  maxLength: 10
                  pattern: ^\d{4}-\d{2}-\d{2}$
                  description: Start date for comparison date range
                compare_end_date:
                  type: string
                  maxLength: 10
                  pattern: ^\d{4}-\d{2}-\d{2}$
                  description: End date for comparison date range
                settings:
                  type: object
                  description: Settings used in query
                cache_minutes:
                  type: integer
                  format: int32
                  minimum: 0
                  maximum: 10080
                  description: Requested maximum age of cache in minutes
            result:
              type: object
              properties:
                total_columns:
                  type: integer
                  format: int32
                  minimum: 0
                  maximum: 1000
                  description: Total amount of columns
                total_rows:
                  type: integer
                  format: int64
                  minimum: 0
                  maximum: 100000000
                  description: Total amount of rows in data
                run_seconds:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 7200
                  description: Number of seconds it took for the query to run
                data_sampled:
                  type: boolean
                  description: If data source has provided sampled data
                cache_used:
                  type: boolean
                  description: If cached data was used
                cache_time:
                  type: string
                  format: date-time
                  maxLength: 30
                  description: ISO 8601 datetime for the most recent cached data
                  nullable: true
            paginate:
              type: object
              properties:
                prev:
                  type: string
                  format: uri
                  maxLength: 500
                  description: URL to previous offset
                next:
                  type: string
                  format: uri
                  maxLength: 500
                  description: URL to next offset
        data:
          type: array
          maxItems: 1000000
          items:
            type: array
            maxItems: 1000
            items:
              type: string
              maxLength: 10000
          description: Query result rows
    DataSourceLogin:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ds_login
        login_id:
          type: string
          maxLength: 50
          pattern: ^[A-Za-z0-9_-]+$
          description: Supermetrics login ID
        login_type:
          type: string
          maxLength: 100
          description: Authentication type. Note that some data sources support multiple
            types, and user can choose between them.
        username:
          type: string
          maxLength: 255
          description: Authenticated username, used in queries as ds_user
        display_name:
          type: string
          maxLength: 255
          description: Visible name for this authentication in product UIs
        ds_info:
          $ref: '#/components/schemas/DataSource'
        default_scopes:
          type: array
          maxItems: 100
          description: List of default source API scopes used in authentication
          items:
            type: string
            maxLength: 100
        additional_scopes:
          type: array
          maxItems: 100
          description: List of additional source API scopes user has granted to access
            more data
          items:
            type: string
            maxLength: 100
        auth_time:
          type: string
          format: date-time
          maxLength: 50
          description: ISO 8601 datetime for when last user authentication occurred
        auth_user_info:
          $ref: '#/components/schemas/User'
        expiry_time:
          type: string
          nullable: true
          format: date-time
          maxLength: 50
          description: ISO 8601 datetime for when authentication expires, if any
        revoked_time:
          type: string
          nullable: true
          format: date-time
          maxLength: 50
          description: ISO 8601 datetime for when authentication was revoked, if any
        is_refreshable:
          type: boolean
          description: Whether authentication can be automatically refreshed after
            expiry time, without user involvement
        is_shared:
          type: boolean
          description: Whether login is shared with all team users
    DatasourceDetailsResponse:
      type: object
      properties:
        meta:
          type: object
          description: Metadata included in every API response.
          properties:
            request_id:
              $ref: '#/components/schemas/RequestId'
          required:
          - request_id
          additionalProperties: false
        data:
          $ref: '#/components/schemas/DatasourceDetails'
    ErrorResponse:
      type: object
      description: Standard envelope returned by all error (4xx/5xx) responses.
      properties:
        meta:
          type: object
          description: Metadata included in every API response.
          properties:
            request_id:
              $ref: '#/components/schemas/RequestId'
          required:
          - request_id
          additionalProperties: false
        error:
          $ref: '#/components/schemas/Error'
      required:
      - meta
      - error
      additionalProperties: false
    LogEntry:
      type: object
      description: A connector execution log entry.
      properties:
        id:
          type: string
          maxLength: 255
          description: Log entry identifier
          example: 123-foo
        log_time:
          type: string
          format: date-time
          maxLength: 30
          description: Timestamp of the log entry
          example: '2025-01-01T00:00:00Z'
        status:
          type: integer
          format: int32
          nullable: true
          minimum: 100
          maximum: 599
          description: HTTP status code
          example: 200
        event:
          type: string
          nullable: true
          maxLength: 255
          description: Event type
          example: auth.token.refresh
        request:
          type: string
          nullable: true
          maxLength: 1000
          description: Request method and path
          example: POST /api/oauth/token_refresh
        duration_ms:
          type: integer
          format: int32
          nullable: true
          minimum: 0
          description: Request duration in milliseconds
          example: 253
        request_id:
          type: string
          format: uuid
          nullable: true
          description: Request tracking identifier
    LoginLink:
      type: object
      properties:
        link_id:
          type: string
          maxLength: 50
          description: Supermetrics login link ID
        status_code:
          type: string
          maxLength: 50
          description: Current link status
          enum:
          - OPEN
          - CLOSED
          - EXPIRED
        description:
          type: string
          maxLength: 1000
          description: Internal link description. Not shown during authentication
            attempt.
        ds_id:
          type: string
          maxLength: 50
          description: Data source ID
        ds_name:
          type: string
          maxLength: 255
          description: Data source name
        require_username:
          type: string
          maxLength: 255
          description: Data source username that must be used in authentication attempt
        redirect_url:
          type: string
          maxLength: 500
          description: Custom URL to redirect to after successful authentication,
            if any
        redirect_verifier:
          type: string
          maxLength: 255
          description: Internal verifier string that is passed to redirect_url
        user_id:
          type: string
          maxLength: 50
          description: Supermetrics user ID of the user who will be marked as the
            primary owner of the login credentials
        user_email:
          type: string
          maxLength: 255
          description: Supermetrics user email
        login_url:
          type: string
          maxLength: 500
          description: Full URL to initiate an authentication attempt. Can be accessed
            multiple times while link is open.
        created_time:
          type: string
          format: date-time
          maxLength: 50
          description: ISO 8601 datetime for when login link was created
        expiry_time:
          type: string
          format: date-time
          maxLength: 50
          description: ISO 8601 datetime for when login link will expire
        login_id:
          type: string
          nullable: true
          maxLength: 50
          description: Supermetrics login ID for a successful authentication
        login_time:
          type: string
          nullable: true
          format: date-time
          maxLength: 50
          description: ISO 8601 datetime for when authentication occurred
        login_username:
          type: string
          nullable: true
          maxLength: 255
          description: Username used to authenticate to data source
    LoginLinkResponse:
      type: object
      properties:
        meta:
          type: object
          description: Metadata included in every API response.
          properties:
            request_id:
              $ref: '#/components/schemas/RequestId'
          required:
          - request_id
          additionalProperties: false
        data:
          $ref: '#/components/schemas/LoginLink'
    ResponseMeta:
      type: object
      description: Metadata included in every API response.
      properties:
        request_id:
          $ref: '#/components/schemas/RequestId'
      required:
      - request_id
      additionalProperties: false
    Secret:
      type: object
      description: A connector secret (value is never returned).
      required:
      - secret_placeholder
      - secret_name
      properties:
        secret_placeholder:
          type: string
          maxLength: 100
          description: Unique identifier for the secret
          example: sec_a23f23d26
        secret_name:
          type: string
          maxLength: 255
          description: Human-readable name of the secret
          example: client_id
    UpdateConnectorRequest:
      type: object
      description: Connector metadata and configuration to update.
      properties:
        connector:
          type: object
          description: Connector metadata to update
          required:
          - name
          - description
          properties:
            name:
              type: string
              maxLength: 255
              description: Name of the connector
            description:
              type: string
              maxLength: 1000
              description: Description of the connector
        configuration:
          type: object
          description: Connector configuration to update
          required:
          - configuration_json
          properties:
            configuration_json:
              type: object
              description: JSON configuration data
    UpdateSecretRequest:
      type: object
      description: New secret value to overwrite the existing one.
      required:
      - secret_value
      properties:
        secret_value:
          type: string
          maxLength: 10000
          description: New plaintext value to overwrite the existing one
          example: new-secret-value
    ConnectorConfiguration:
      type: object
      description: Configuration data for a connector.
      properties:
        version:
          type: string
          maxLength: 20
          description: Version of the configuration
          example: 1.0.0
        configuration_json:
          type: object
          description: JSON configuration data
        created_at:
          type: string
          format: date-time
          maxLength: 30
          description: Configuration creation timestamp in ISO 8601 format
          example: '2025-01-01T00:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          maxLength: 30
          description: Configuration last update timestamp in ISO 8601 format
          example: '2025-01-01T00:00:00+00:00'
    DataSource:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ds
        ds_id:
          type: string
          maxLength: 50
          pattern: ^[A-Za-z0-9_-]+$
          description: Data source ID
        name:
          type: string
          maxLength: 255
          description: Data source name
    DatasourceDetails:
      type: object
      properties:
        id:
          type: string
          maxLength: 100
          example: GAWA
        name:
          type: string
          maxLength: 100
          example: Google Analytics 4
        description:
          type: string
          maxLength: 2000
        marketing_name:
          type: string
          maxLength: 100
          nullable: true
        logo_url:
          type: string
          maxLength: 500
        categories:
          type: array
          maxItems: 50
          items:
            type: string
            enum:
            - Ad Verification
            - Affiliate
            - Analytics
            - Brand Reputation
            - CRM/Sales
            - Data Warehouses
            - DSP
            - Ecommerce
            - Files
            - Marketing Attribution
            - Marketing Automation
            - Mobile
            - Other
            - Paid Media
            - Payments
            - Retail Media
            - Search
            - SEO
            - Social Media
        products:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 100
          example:
          - API
          - DS
          - SHEETS
          - EXCEL
          - DWH
        status:
          type: string
          enum:
          - Early access
          - Released
          example: Released
        is_premium:
          type: boolean
          example: false
        tags:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 100
          example:
          - popular
        is_authentication_required:
          type: boolean
          example: true
        has_account_list:
          type: boolean
          example: true
        has_fields:
          type: boolean
          example: true
        has_segments:
          type: boolean
          example: false
        has_report_type_selection:
          type: boolean
          example: false
        is_date_range_required:
          type: boolean
          example: true
        is_custom_data_import:
          type: boolean
          example: false
        min_metrics:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          nullable: true
